<ion-header>
  <ion-toolbar color="primary">
    <ion-title>Fila de Atendimento</ion-title>
  </ion-toolbar>
</ion-header>

<ion-content class="ion-padding">

  <ion-button expand="block" color="success" (click)="ticketService.chamarProximo()">
    Chamar Próximo
  </ion-button>

  <ion-list>
    <ion-item *ngFor="let t of ticketService.fila">
      <ion-label>
        <h2>{{ t.numero }}</h2>
        <p>Tipo: {{ t.tipo }}</p>
      </ion-label>
    </ion-item>
  </ion-list>
</ion-content>
