<ion-header>
  <ion-toolbar color="success">
    <ion-title>🖥️ Guichê de Atendimento</ion-title>
  </ion-toolbar>
</ion-header>

<ion-content class="ion-padding">

  <ion-button expand="block" color="success" (click)="chamarProximo()">
    CHAMAR PRÓXIMO
  </ion-button>

  <ion-card *ngIf="senhaAtual">
    <ion-card-header>
      <ion-card-title>ATENDENDO AGORA</ion-card-title>
    </ion-card-header>

    <ion-card-content>
      <h1 class="senha-atual">{{ senhaAtual }}</h1>
    </ion-card-content>
  </ion-card>

</ion-content>
